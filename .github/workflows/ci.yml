name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Syntax checks
        run: node --check main.js && node --check preload.js && node --check i18n.js && node --check tools/check-free-build.js && node --check tools/check-public-site.js && node --check tools/check-packaged-free-build.js && node --check tools/assert-release-tag.js && node --check tools/verify-release-evidence.js && node --check tools/run-test-suite.js
      - name: Free-build contract
        run: npm run check:free
      - name: Public site contract
        run: npm run check:site
      - name: Dependency audit
        run: npm audit
      - name: Module tests
        run: npm test
