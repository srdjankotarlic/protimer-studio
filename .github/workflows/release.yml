name: Build beta packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-arm64:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build Apple Silicon DMG
        run: npm run dist:mac
      - name: Verify package boot and DMG
        run: |
          "dist-installers/mac-arm64/ProTimer Studio.app/Contents/MacOS/ProTimer Studio" --print-build-info
          hdiutil verify dist-installers/ProTimer-Studio-*-arm64.dmg
          node node_modules/@electron/fuses/dist/bin.js read --app "dist-installers/mac-arm64/ProTimer Studio.app"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: dist-installers/ProTimer-Studio-*-arm64.dmg
          if-no-files-found: error

  windows-x64:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build Windows installer and portable app
        run: npm run dist:win
      - name: Verify x64 package inputs
        shell: pwsh
        run: |
          if (-not (Test-Path "dist-installers/win-unpacked/ProTimer Studio.exe")) { throw "Missing unpacked app" }
          if (-not (Test-Path "dist-installers/ProTimer-Studio-Setup-*.exe")) { throw "Missing installer" }
          if (-not (Test-Path "dist-installers/ProTimer-Studio-*-portable.exe")) { throw "Missing portable app" }
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: |
            dist-installers/ProTimer-Studio-Setup-*.exe
            dist-installers/ProTimer-Studio-*-portable.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-arm64, windows-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum ProTimer-Studio-* > SHA256SUMS.txt
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --repo "${GITHUB_REPOSITORY}"
          --prerelease
          --verify-tag
          --title "ProTimer Studio ${GITHUB_REF_NAME}"
          --notes-file docs/RELEASE-NOTES-0.9.0-beta.1.md
