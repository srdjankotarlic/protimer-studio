name: Build beta packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*-beta.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate beta tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          node tools/assert-release-tag.js beta "$GITHUB_REF_NAME"
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Beta release blocked: tagged commit is not on origin/main." >&2
            exit 1
          fi

  macos-arm64:
    needs: preflight
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build Apple Silicon DMG
        run: npm run dist:mac
      - name: Verify package boot and DMG
        run: |
          build_info="$("dist-installers/mac-arm64/ProTimer Studio.app/Contents/MacOS/ProTimer Studio" --print-build-info)"
          printf '%s\n' "$build_info"
          node -e "const d=JSON.parse(process.argv[1]); if(d.dirty || d.commitFull!==process.env.GITHUB_SHA) process.exit(1)" "$build_info"
          npm run check:packaged-free -- "dist-installers/mac-arm64/ProTimer Studio.app/Contents/Resources/app.asar"
          hdiutil verify dist-installers/ProTimer-Studio-*-arm64.dmg
          node node_modules/@electron/fuses/dist/bin.js read --app "dist-installers/mac-arm64/ProTimer Studio.app"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: dist-installers/ProTimer-Studio-*-arm64.dmg
          if-no-files-found: error

  windows-x64:
    needs: preflight
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build Windows installer and portable app
        run: npm run dist:win
      - name: Verify x64 package inputs
        shell: pwsh
        run: |
          if (-not (Test-Path "dist-installers/win-unpacked/ProTimer Studio.exe")) { throw "Missing unpacked app" }
          if (-not (Test-Path "dist-installers/ProTimer-Studio-Setup-*.exe")) { throw "Missing installer" }
          if (-not (Test-Path "dist-installers/ProTimer-Studio-*-portable.exe")) { throw "Missing portable app" }
          $buildInfoJson = & "dist-installers/win-unpacked/ProTimer Studio.exe" --print-build-info | Out-String
          if ($LASTEXITCODE -ne 0) { throw "Packaged Windows CLI boot failed." }
          Write-Host $buildInfoJson
          $buildInfo = $buildInfoJson | ConvertFrom-Json
          if ($buildInfo.dirty -or $buildInfo.commitFull -ne $env:GITHUB_SHA) {
            throw "Packaged Windows build provenance does not match the clean workflow commit."
          }
          npm run check:packaged-free -- "dist-installers/win-unpacked/resources/app.asar"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: |
            dist-installers/ProTimer-Studio-Setup-*.exe
            dist-installers/ProTimer-Studio-*-portable.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [preflight, macos-arm64, windows-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum ProTimer-Studio-* > SHA256SUMS.txt
      - name: Attest release binaries
        uses: actions/attest@v4
        with:
          subject-path: release-assets/ProTimer-Studio-*
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mac_asset="$(find release-assets -maxdepth 1 -name 'ProTimer-Studio-*-arm64.dmg' -print -quit)"
          windows_setup="$(find release-assets -maxdepth 1 -name 'ProTimer-Studio-Setup-*.exe' -print -quit)"
          windows_portable="$(find release-assets -maxdepth 1 -name 'ProTimer-Studio-*-portable.exe' -print -quit)"
          checksums="release-assets/SHA256SUMS.txt"

          test -n "$mac_asset"
          test -n "$windows_setup"
          test -n "$windows_portable"
          test -f "$checksums"

          gh release create "${GITHUB_REF_NAME}" \
            "${mac_asset}#macOS Apple Silicon installer (recommended)" \
            "${windows_setup}#Windows x64 installer (recommended)" \
            "${windows_portable}#Windows x64 portable app (advanced)" \
            "${checksums}#Optional SHA-256 checksums" \
            --repo "${GITHUB_REPOSITORY}" \
            --prerelease \
            --verify-tag \
            --title "ProTimer Studio ${GITHUB_REF_NAME}" \
            --generate-notes
