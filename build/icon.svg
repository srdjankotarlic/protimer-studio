<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="tile" x1="224" y1="124" x2="814" y2="916" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#292c31"/>
      <stop offset="0.58" stop-color="#1a1d21"/>
      <stop offset="1" stop-color="#101215"/>
    </linearGradient>
    <linearGradient id="rim" x1="246" y1="154" x2="766" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f7f9"/>
      <stop offset="0.55" stop-color="#d8dde3"/>
      <stop offset="1" stop-color="#aeb6c0"/>
    </linearGradient>
    <linearGradient id="signal" x1="708" y1="318" x2="766" y2="378" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#76dc91"/>
      <stop offset="1" stop-color="#3faf63"/>
    </linearGradient>
    <filter id="tileShadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <filter id="signalGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#4bc56c" flood-opacity=".36"/>
    </filter>
  </defs>

  <!-- Keep the tile inside the macOS icon safe area. Transparent corners are intentional. -->
  <rect x="92" y="92" width="840" height="840" rx="188" fill="url(#tile)" filter="url(#tileShadow)"/>
  <rect x="98" y="98" width="828" height="828" rx="182" fill="none" stroke="#ffffff" stroke-opacity=".13" stroke-width="7"/>
  <path d="M164 314 C202 203 294 132 410 112" fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="8" stroke-linecap="round"/>

  <!-- A single centered mark: stage/output frame inside a timing arc. -->
  <path d="M373 271 A278 278 0 1 0 740 353" fill="none" stroke="url(#rim)" stroke-width="44" stroke-linecap="round"/>
  <circle cx="740" cy="353" r="27" fill="url(#signal)" filter="url(#signalGlow)"/>

  <path d="M466 382 H390 Q356 382 356 416 V616 Q356 650 390 650 H634 Q668 650 668 616 V416 Q668 382 634 382 H558"
        fill="none" stroke="url(#rim)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M512 348 V548" fill="none" stroke="url(#rim)" stroke-width="22" stroke-linecap="round"/>
  <circle cx="512" cy="568" r="22" fill="#171a1e" stroke="url(#rim)" stroke-width="11"/>
</svg>
